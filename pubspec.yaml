name: ollama_chat
description: A beautiful open-source Flutter chat client for Ollama — with Egyptian Arabic support.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # DI
  get_it: ^7.7.0

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.3

  # UI
  flutter_markdown: ^0.7.3
  flutter_highlight: ^0.7.0
  flex_color_scheme: ^8.0.0

  # Utilities
  dartz: ^0.10.1
  uuid: ^4.4.0
  intl: ^0.20.2
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
